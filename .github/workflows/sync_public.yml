name: Sync to Public Repo

on:
  workflow_dispatch:
    inputs:
      commit_msg:
        description: 'Optional: Enter a description of changes (defaults to timestamp if empty)'
        required: false
        type: string

jobs:
  sync_public:
    runs-on: ubuntu-latest
    steps:
      # 1. Check out Private Repo
      - name: Checkout Private Source
        uses: actions/checkout@v4
        with:
          path: source_repo
          fetch-depth: 0

      # 2. Check out Public Repo
      - name: Checkout Public Portfolio
        uses: actions/checkout@v4
        with:
          repository: WonderMOMOCO/Battle-Cats-Complete
          token: ${{ secrets.PUBLIC_REPO_TOKEN }}
          path: public_repo

      # 3. Mirror Files
      - name: Sync and Overwrite
        run: |
          # Sync Files using rsync
          # --delete: Removes files in public_repo that no longer exist in source_repo
          # We exclude .git to avoid corrupting the public repository history
          # We exclude .github to prevent overwriting public workflows with private ones
          
          rsync -av --delete \
            --exclude '.git' \
            --exclude '.github' \
            source_repo/ public_repo/

      # 4. Commit to Public with Smart Message Logic
      - name: Commit and Push
        run: |
          cd public_repo
          
          # Configure Git with Verified No-Reply Identity
          git config user.name "WonderMOMOCO"
          git config user.email "WonderMOMOCO@users.noreply.github.com"
          
          git add .
          
          # Generate Timestamp for the fallback message
          TIMESTAMP=$(TZ="America/New_York" date +'%Y-%m-%d | %H:%M:%S')
          
          # Logic: Use the manual input if provided, otherwise use the timestamp
          if [[ "${{ github.event.inputs.commit_msg }}" != "" ]]; then
            FINAL_MSG="${{ github.event.inputs.commit_msg }}"
          else
            FINAL_MSG="Update: $TIMESTAMP"
          fi
          
          # Only commit and push if there are actual file changes
          if [[ -n $(git status -s) ]]; then
            git commit -m "$FINAL_MSG"
            git push origin main
          else
            echo "No changes detected. Skipping sync."
          fi